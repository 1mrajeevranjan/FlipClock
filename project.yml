name: FlipClock
options:
  bundleIdPrefix: com.rajeevranjan
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  FlipClock:
    type: application
    platform: macOS
    sources:
      - path: FlipClock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rajeevranjan.flipclock
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    info:
      path: FlipClock/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
